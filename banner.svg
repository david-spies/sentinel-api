<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" width="960" height="280" role="img">
  <title>Sentinel-API — Enterprise API Security Scanner</title>
  <desc>Dark banner for Sentinel-API showing the hexagonal logo mark, wordmark, tagline, and a row of feature pills</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="280" fill="#090d14"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.035" stroke="#60a5fa" stroke-width="0.5">
    <!-- Vertical lines -->
    <line x1="80"  y1="0" x2="80"  y2="280"/>
    <line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="320" y1="0" x2="320" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="480" y1="0" x2="480" y2="280"/>
    <line x1="560" y1="0" x2="560" y2="280"/>
    <line x1="640" y1="0" x2="640" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="880" y1="0" x2="880" y2="280"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="56"  x2="960" y2="56"/>
    <line x1="0" y1="112" x2="960" y2="112"/>
    <line x1="0" y1="168" x2="960" y2="168"/>
    <line x1="0" y1="224" x2="960" y2="224"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="280" fill="#3b82f6"/>

  <!-- Top-right corner accent lines -->
  <line x1="900" y1="0" x2="960" y2="0"   stroke="#1e3a5f" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="60"  stroke="#1e3a5f" stroke-width="1"/>

  <!-- Bottom-left corner accent lines -->
  <line x1="0"   y1="220" x2="0"   y2="280" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="0"   y1="280" x2="60"  y2="280" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Hexagonal logo mark — centered at x=96, y=140 -->
  <!-- Outer hex (large, faint border) -->
  <polygon points="96,80 138,103 138,149 96,172 54,149 54,103"
           fill="none" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Middle hex (filled dark blue) -->
  <polygon points="96,88 130,107 130,145 96,164 62,145 62,107"
           fill="#0e1f3d" stroke="#1d4ed8" stroke-width="1"/>

  <!-- Inner hex (bright blue) -->
  <polygon points="96,102 118,114 118,138 96,150 74,138 74,114"
           fill="#1d4ed8" stroke="#3b82f6" stroke-width="0.5"/>

  <!-- Center dot -->
  <circle cx="96" cy="126" r="7" fill="#93c5fd"/>

  <!-- Outer ring scan lines (radar effect) -->
  <circle cx="96" cy="126" r="22" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
  <circle cx="96" cy="126" r="34" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <circle cx="96" cy="126" r="46" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.1"/>

  <!-- Crosshair marks -->
  <line x1="96" y1="82"  x2="96" y2="94"  stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <line x1="96" y1="158" x2="96" y2="170" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <line x1="52" y1="126" x2="64" y2="126" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <line x1="128" y1="126" x2="140" y2="126" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>

  <!-- Wordmark: SENTINEL -->
  <text x="170" y="126"
        font-family="'Syne', 'Arial Black', sans-serif"
        font-weight="800"
        font-size="62"
        letter-spacing="-1"
        fill="#e2e8f0">SENTINEL</text>

  <!-- Wordmark: -API (blue accent) -->
  <text x="460" y="126"
        font-family="'Syne', 'Arial Black', sans-serif"
        font-weight="800"
        font-size="62"
        letter-spacing="-1"
        fill="#3b82f6">-API</text>

  <!-- Thin separator line below wordmark -->
  <line x1="170" y1="140" x2="730" y2="140" stroke="#1e2d45" stroke-width="0.5"/>

  <!-- Tagline -->
  <text x="170" y="165"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-weight="400"
        font-size="14"
        letter-spacing="0.5"
        fill="#5a6a84">Enterprise API security scanner — OWASP · NVD · CISA KEV · AI remediation</text>

  <!-- Version badge -->
  <rect x="170" y="192" width="68" height="22" rx="4" fill="#0e1f3d" stroke="#1d4ed8" stroke-width="0.8"/>
  <text x="204" y="207"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-weight="500"
        font-size="11"
        text-anchor="middle"
        fill="#60a5fa">v 2.4.1</text>

  <!-- Feature pills row -->
  <!-- Go -->
  <rect x="248" y="192" width="50" height="22" rx="4" fill="#042c53" stroke="#185fa5" stroke-width="0.8"/>
  <text x="273" y="207"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        text-anchor="middle"
        fill="#60a5fa">Go 1.22</text>

  <!-- Python -->
  <rect x="308" y="192" width="64" height="22" rx="4" fill="#042c53" stroke="#185fa5" stroke-width="0.8"/>
  <text x="340" y="207"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        text-anchor="middle"
        fill="#60a5fa">Python 3.11</text>

  <!-- OWASP -->
  <rect x="382" y="192" width="60" height="22" rx="4" fill="#1a0505" stroke="#a32d2d" stroke-width="0.8"/>
  <text x="412" y="207"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        text-anchor="middle"
        fill="#f87171">OWASP 2023</text>

  <!-- NVD -->
  <rect x="452" y="192" width="42" height="22" rx="4" fill="#1a0505" stroke="#a32d2d" stroke-width="0.8"/>
  <text x="473" y="207"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        text-anchor="middle"
        fill="#f87171">NVD API</text>

  <!-- HTMX -->
  <rect x="504" y="192" width="56" height="22" rx="4" fill="#0c1a0c" stroke="#3b6d11" stroke-width="0.8"/>
  <text x="532" y="207"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        text-anchor="middle"
        fill="#34d399">HTMX UI</text>

  <!-- gRPC -->
  <rect x="570" y="192" width="46" height="22" rx="4" fill="#160a2a" stroke="#534ab7" stroke-width="0.8"/>
  <text x="593" y="207"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        text-anchor="middle"
        fill="#a78bfa">gRPC</text>

  <!-- Mistral AI -->
  <rect x="626" y="192" width="72" height="22" rx="4" fill="#160a2a" stroke="#534ab7" stroke-width="0.8"/>
  <text x="662" y="207"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        text-anchor="middle"
        fill="#a78bfa">Mistral-7B</text>

  <!-- Right-side decorative scan sweep -->
  <g opacity="0.06">
    <line x1="840" y1="40"  x2="920" y2="40"  stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="820" y1="55"  x2="920" y2="55"  stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="840" y1="70"  x2="920" y2="70"  stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="860" y1="85"  x2="920" y2="85"  stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="820" y1="100" x2="920" y2="100" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="840" y1="115" x2="920" y2="115" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="860" y1="130" x2="920" y2="130" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="820" y1="145" x2="920" y2="145" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="840" y1="160" x2="920" y2="160" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="860" y1="175" x2="920" y2="175" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="820" y1="190" x2="920" y2="190" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="840" y1="205" x2="920" y2="205" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="860" y1="220" x2="920" y2="220" stroke="#60a5fa" stroke-width="0.5"/>
    <line x1="820" y1="235" x2="920" y2="235" stroke="#60a5fa" stroke-width="0.5"/>
  </g>

  <!-- Right accent: small hexagonal target reticle -->
  <g transform="translate(878, 140)">
    <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"
             fill="none" stroke="#1e3a5f" stroke-width="1"/>
    <polygon points="0,-16 13.9,-8 13.9,8 0,16 -13.9,8 -13.9,-8"
             fill="none" stroke="#1d4ed8" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="1.5" fill="#60a5fa"/>
    <line x1="0" y1="-30" x2="0" y2="-20" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="20"  x2="0" y2="30"  stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="-30" y1="0" x2="-18" y2="0" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
    <line x1="18"  y1="0" x2="30"  y2="0" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Bottom rule -->
  <line x1="3" y1="279" x2="960" y2="279" stroke="#1e2d45" stroke-width="0.5"/>
</svg>
